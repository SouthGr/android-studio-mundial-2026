<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sistema de gestión de entradas para el Mundial FIFA 2026 — USA, Canadá y México." />
  <title>FIFA 2026 — Entradas Oficiales</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar" role="navigation" aria-label="Navegación principal">
    <div class="navbar__inner">

      <!-- Logo -->
      <a class="navbar__brand" href="#/" aria-label="FIFA 2026 — Inicio">
        <span class="brand-icon">⚽</span>
        <span class="brand-text">FIFA <strong>2026</strong></span>
      </a>

      <!-- Desktop links -->
      <ul class="navbar__links" role="list">
        <li><a href="#/" class="navbar__link" data-nav="home">Inicio</a></li>
        <li><a href="#/partidos" class="navbar__link" data-nav="partidos">Partidos</a></li>
        <li><a href="#/estadios" class="navbar__link" data-nav="estadios">Estadios</a></li>
        <li id="navAuthDesktop" class="navbar__auth"></li>
      </ul>

      <!-- Hamburger -->
      <button
        class="navbar__toggle"
        id="navToggle"
        aria-label="Abrir menú"
        aria-expanded="false"
        aria-controls="navMenu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <!-- Mobile menu -->
    <div class="navbar__menu" id="navMenu" role="menu" aria-hidden="true">
      <a href="#/" class="navbar__menu-link" data-nav="home" role="menuitem">🏠 Inicio</a>
      <a href="#/partidos" class="navbar__menu-link" data-nav="partidos" role="menuitem">📅 Partidos</a>
      <a href="#/estadios" class="navbar__menu-link" data-nav="estadios" role="menuitem">🏟️ Estadios</a>
      <div id="navAuthMobile" class="navbar__auth navbar__auth--mobile"></div>
    </div>
  </nav>

  <!-- MAIN — SPA container -->
  <main id="app" role="main" aria-live="polite"></main>

  <!-- FOOTER -->
  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <div class="footer__brand">
        <span class="brand-icon">⚽</span>
        <span>FIFA <strong>2026</strong></span>
      </div>
      <p class="footer__tagline">El mundo unido — USA · Canadá · México</p>
      <nav class="footer__links" aria-label="Navegación pie de página">
        <a href="#/">Inicio</a>
        <a href="#/partidos">Partidos</a>
        <a href="#/estadios">Estadios</a>
      </nav>
      <p class="footer__copy">Trabajo Práctico Nº1 · Técnicatura Universitaria en Programación · 2026</p>
    </div>
  </footer>

  <!-- TOAST container -->
  <div class="toast-container" id="toastContainer" aria-live="assertive" aria-atomic="true"></div>

  <!-- SCRIPTS -->
  <!-- Los datos (equipos, estadios, partidos) ahora se sirven desde la API .NET + SQL Server (ver /backend) -->
  <script src="js/app.js"></script>

</body>
</html>
